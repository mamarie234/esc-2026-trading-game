<meta charset="UTF-8">
<head>
  <title>Eurovision Pocket: Chaos Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <div id="bonusPopup" style="
  display:none;
  pointer-events:auto;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:#222;
  padding:20px;
  border:5px solid gold;
  border-radius:15px;
  box-shadow:0 0 25px gold;
  z-index:9999;
  text-align:center;
  color:white;
  font-size:18px;
  max-width:300px;
">
  <div id="bonusPopupText"></div>
  
  <button class="popupBtn" onclick="closeBonusPopup()" style="
  margin-top:15px;
  padding:8px 16px;
  background:gold;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
">OK</button>
</div>

  <style>
    body {
   font-family: system-ui, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
  margin: 0;
  background: #111;
  color: #fff;
  text-align: center;
}

h1 {
  font-size: 22px;
  margin: 15px;
}

button {
  font-size: 18px;
  padding: 14px;
  margin: 10px;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  border: none;
}

#pack, #collection {
  display: grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 10px;
}

.card {
  border-radius: 12px;
  padding: 10px;
  background: #000;
  color: #fff;
  text-align: left;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  transition: transform 0.2s ease;
  height: auto;
  margin-bottom: 20px;

}
.special {
  border: 3px solid hotpink;
  box-shadow: 0 0 20px hotpink;
}

.card:hover {
  transform: scale(1.05);
}


.common { border: 2px solid gray; }
.rare { border: 2px solid cyan; }
.legendary { border: 2px solid gold; }



.back {
  background: #333;
  color: #aaa;
}

#timer {
  font-size: 16px;
  margin: 10px;
}

input {
  padding: 12px;
  font-size: 16px;
  width: 80%;
  border-radius: 8px;
  border: none;
}
@media (min-width: 600px) {
  #pack, #collection {
    grid-template-columns: repeat(3, 1fr);
  }
}
#collectionWrapper {
  overflow: hidden;
  transition: max-height 0.4s ease;
  max-height: none;
}

#collectionWrapper.collapsed {
  max-height: 0;
}

.cardImage {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover; /* fills square nicely */
  border-radius: 10px;
  display: block;
  margin: 0 auto 8px auto;
}


  </style>
</head>

const allCards = cards; // deine globale Liste umbenennen

let selectedCardIndex = null;
let collection = JSON.parse(localStorage.getItem("esc")) || [];
let unlockedCombos = JSON.parse(localStorage.getItem("unlockedCombos") || "[]");


function draw() {
  let now = Date.now();
  let lastOpen = localStorage.getItem("lastPackTime");

  // ⏱️ Cooldown
  if (lastOpen && now - lastOpen < 60 * 60 * 1000) {
    updateTimer();
    return;
  }

  localStorage.setItem("lastPackTime", now);

  let pack = document.getElementById("pack");

  // 🔥 WICHTIG: komplett sauber leeren
  pack.innerHTML = "";

  let drawnCards = [];
  let cardDivs = [];

  // 🎴 exakt 3 Karten erzeugen
  for (let i = 0; i < 3; i++) {
    let card = getRandomCard();
    drawnCards.push(card);

    // Sammlung speichern
    collection.push(card);

    let div = document.createElement("div");
    div.className = "card back";
    div.innerText = "🎴 PACK";

    pack.appendChild(div);
    cardDivs.push(div);
  }

  localStorage.setItem("esc", JSON.stringify(collection));

  // ✨ Reveal
  cardDivs.forEach((div, i) => {
    setTimeout(() => {
      let card = drawnCards[i];

      div.className = "card " + card.rarity;
      div.innerHTML = `
		  <img src="${card.image}" class="cardImage">

		  <div style="font-size:14px; opacity:0.9; margin-top:4px; font-weight: bold;">
		    ${card.name} 
		  </div>
		  <div style="font-size:14px; opacity:0.9; margin-top:0px;">
			${card.artist} 
		  </div>
		   <div style="font-size:14px; opacity:0.9; margin-top:0px;">
			${card.country} ${card.flag} (${card.year})
			</div>
		`;

      if (card.rarity === "legendary") {
        div.style.transform = "scale(1.15)";
        div.style.boxShadow = "0 0 20px gold";
        legendaryEffect();
      }

    }, 700 * (i + 1));
  });
  console.log("Cards drawn:", drawnCards.length);

  // ⏳ Erst rendern, wenn alle Karten gezeigt wurden
	setTimeout(() => {
	  render();
	}, 700 * (drawnCards.length + 1));

}

function render() {
  let col = document.getElementById("collection");
  col.innerHTML = "";

  // 🔥 Karten gruppieren (Duplikate zusammenfassen)
	let grouped = {};

	collection.forEach((card, index) => {
	  let key = card.name;

	  if (!grouped[key]) {
		grouped[key] = { card: card, count: 0, firstIndex: index };
	  }

	  grouped[key].count++;
	});


  // 🔥 Sortierung auswählen
  let sortMode = document.getElementById("sortSelect").value;

  let sorted = Object.values(grouped);

  if (sortMode === "name") {
    sorted.sort((a, b) => a.card.name.localeCompare(b.card.name));
  }

  if (sortMode === "country") {
    sorted.sort((a, b) => a.card.country.localeCompare(b.card.country));
  }

  if (sortMode === "count") {
    sorted.sort((a, b) => b.count - a.count);
  }

  if (sortMode === "year") {
    sorted.sort((a, b) => a.card.year - b.card.year);
  }

  // 🔥 Ausgabe
	sorted.forEach(entry => {
	  let c = entry.card;

	  let div = document.createElement("div");
	  div.className = "card " + c.rarity;

	  div.innerHTML = `
		  <img src="${c.image}" class="cardImage">

		  <div style="font-size:14px; opacity:0.9; margin-top:4px; font-weight: bold;">
		    ${c.name} 
		  </div>
		  <div style="font-size:14px; opacity:0.9; margin-top:0px;">
			${c.artist} ${c.category}

function checkCombos() {
  let combosDiv = document.getElementById("combos");
  combosDiv.innerHTML = "";

  comboList.forEach(combo => {
    let unlocked = combo.check(collection);
    let alreadyUnlocked = unlockedCombos.includes(combo.id);

    // UI anzeigen
    combosDiv.innerHTML += `
      <div style="margin-bottom:8px; padding:6px; border-radius:6px;
        background:${unlocked ? '#0f04' : '#0003'};">
        <strong>${unlocked ? "✅" : "❌"} ${combo.name}</strong><br>
        <small>${combo.description}</small><br>
        <small style="opacity:0.8;">${combo.missing(collection)}</small>
      </div>
    `;

    // Belohnung vergeben, wenn NEU freigeschaltet
    if (unlocked && !alreadyUnlocked) {
      unlockedCombos.push(combo.id);
      saveUnlockedCombos();

      giveLegendaryReward(combo.name);
    }
  });
}




function updateTimer() {
  let timerDiv = document.getElementById("timer");
  let lastOpen = localStorage.getItem("lastPackTime");
  let button = document.getElementById("drawButton");

	if (!lastOpen) {
	  timerDiv.innerText = "🎁 Pack bereit!";
	  button.disabled = false;
	  button.style.opacity = 1;
	  return;
	}


  let diff = Date.now() - lastOpen;
  let remaining = 60 * 60 * 1000 - diff;

  if (remaining <= 0) {
    timerDiv.innerText = "🎁 Pack bereit!";
    return;
  }

  let hours = Math.floor(remaining / (1000 * 60 * 60));
  let minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));

  timerDiv.innerText = "⏳ Nächster Pack in " + hours + "h " + minutes + "min";

	if (remaining > 0) {
	  button.disabled = true;
	  button.style.opacity = 0.5;
	} else {
	  button.disabled = false;
	  button.style.opacity = 1;
	}

}

function getRandomCard() {
  let rand = Math.random();
  let rarity =
    rand < 0.1 ? "legendary" :
    rand < 0.4 ? "rare" :
    "common";

  let pool = cards.filter(c => c.rarity === rarity);
  return pool[Math.floor(Math.random() * pool.length)];
}


function generateTrade() {
  if (selectedCardIndex === null || selectedCardIndex === undefined) {
    document.getElementById("tradeStatus").innerText =
      "❌ Bitte wähle zuerst eine Karte aus!";
    return;
  }

  // 🔥 Die richtige Karte holen
  let card = collection[selectedCardIndex];

  // 🔥 Code erstellen
  let code = encodeUTF8(card);


  document.getElementById("tradeStatus").innerText =
    "📤 Code erstellt für: " + card.name;

  // 🔥 Code anzeigen
  document.getElementById("tradeCodeBox").style.display = "block";
  document.getElementById("tradeCodeBox").innerText = code;

  document.getElementById("copyBtn").style.display = "inline-block";

  // 🔥 Nur EIN Exemplar entfernen
  collection.splice(selectedCardIndex, 1);

  // 🔥 Auswahl zurücksetzen
  selectedCardIndex = null;

  // 🔥 Speichern
  localStorage.setItem("esc", JSON.stringify(collection));

  render();
}

function importTrade() {
  let code = document.getElementById("tradeInput").value;

  try {
    let card = decodeUTF8(code);

    collection.push(card);
    localStorage.setItem("esc", JSON.stringify(collection));

    document.getElementById("tradeStatus").innerText =
      "✅ Karte importiert: " + card.name;

    // 🔥 Eingabefeld leeren
    document.getElementById("tradeInput").value = "";

    render();
  } catch (e) {
    console.error(e);
    document.getElementById("tradeStatus").innerText =
      "❌ Ungültiger Code!";
  }
}



function copyTradeCode() {
  let code = document.getElementById("tradeCodeBox").innerText;

  navigator.clipboard.writeText(code).then(() => {
    document.getElementById("tradeStatus").innerText =
      "✅ Code kopiert!";
  });
}

function encodeUTF8(obj) {
  return btoa(new TextEncoder().encode(JSON.stringify(obj)).reduce((acc, byte) => acc + String.fromCharCode(byte), ""));
}


function decodeUTF8(str) {
  const binary = atob(str);
  const bytes = new Uint8Array([...binary].map(ch => ch.charCodeAt(0)));
  return JSON.parse(new TextDecoder().decode(bytes));
}

let collectionCollapsed = false;

function toggleCollection() {
  const wrapper = document.getElementById("collectionWrapper");
  const arrow = document.getElementById("collectionArrow");

  collectionCollapsed = !collectionCollapsed;

  if (collectionCollapsed) {
    wrapper.style.maxHeight = "0px";
    arrow.textContent = "▶";
  } else {
    wrapper.style.maxHeight = wrapper.scrollHeight + "px";
    arrow.textContent = "▼";
  }
}

function saveUnlockedCombos() {
  localStorage.setItem("unlockedCombos", JSON.stringify(unlockedCombos));
}

function getRandomLegendaryCard() {
  let legendaryCards = cards.filter(c => c.rarity === "legendary");

  if (legendaryCards.length === 0) {
    console.warn("Keine legendary Karten definiert!");
    return null;
  }

  return legendaryCards[Math.floor(Math.random() * legendaryCards.length)];
}

function giveCardToPlayer() {
  let lunaCard = cards.find(c => c.rarity === "special");

  if (!lunaCard) {
    console.warn("Keine Luna Karte definiert!");
    return null;
  }
  return lunaCard;
}

function giveLegendaryReward(comboName) {

  let card; // ⭐ Wichtig: oben definieren, damit überall sichtbar

  if (comboName === "LEGENDARY WINNERS") {
    card = giveCardToPlayer();   // ⭐ Spezialkarte
  } else {
    card = getRandomLegendaryCard();   // ⭐ normale Legendary
  }

  if (!card) return;

  // Karte klonen, damit sie nicht referenziert wird
  let newCard = JSON.parse(JSON.stringify(card));

  collection.push(newCard);
  localStorage.setItem("esc", JSON.stringify(collection));

  showBonusPopup(
    "🎉 LEGENDARY BONUS!\n\n" +
    "Combo: " + comboName + "\n" +
    "Belohnung: ⭐⭐⭐\n" +
    newCard.name + "\n" +
    newCard.artist + "\n" +
    newCard.country + " (" + newCard.year + ")"
  );

  // 🔥 Sammlung neu anzeigen
  render();
}

function showBonusPopup(text) {
  document.getElementById("bonusPopupText").innerText = text;

  let btn = document.querySelector("#bonusPopup button");
  btn.disabled = false;
  btn.style.opacity = "1";
  btn.style.pointerEvents = "auto";

  document.getElementById("bonusPopup").style.display = "block";
}



window.closeBonusPopup = function () {
  document.getElementById("bonusPopup").style.display = "none";
};
